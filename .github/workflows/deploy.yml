name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Migrate and deploy production
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test
        run: npm run test

      - name: Migrate production database schema
        run: npm run db:migrate
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Migrate production Supabase platform resources
        run: npx supabase db push --db-url "$SUPABASE_DATABASE_URL"
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production

      - name: Build Vercel production artifact
        run: npx vercel build --prod

      - name: Deploy Vercel production artifact
        run: npx vercel deploy --prebuilt --prod
